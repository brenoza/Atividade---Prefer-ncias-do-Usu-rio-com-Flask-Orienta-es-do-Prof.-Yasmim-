<!DOCTYPE html>
<html lang="pt-br" data-tema="{{ tema }}">
<head>
    <meta charset="UTF-8">
    <title> <style>
        html[data-tema="claro"] {
    background: #f5f5f5;
    color: #222;
}

html[data-tema="escuro"] {
    background: #121212;
    color: #eee;
}

body {
    font-family: Arial, sans-serif;
    margin: 40px;
}


.switch {
    position: relative;
    display: inline-block;
    width: 60px;
    height: 34px;
}
.switch input { display: none; }
.slider {
    position: absolute;
    cursor: pointer;
    background-color: #ccc;
    border-radius: 34px;
    top: 0; left: 0; right: 0; bottom: 0;
    transition: .4s;
}
.slider:before {
    position: absolute;
    content: "";
    height: 26px; width: 26px;
    left: 4px; bottom: 4px;
    background-color: white;
    border-radius: 50%;
    transition: .4s;
}
input:checked + .slider {
    background-color: #2196F3;
}
input:checked + .slider:before {
    transform: translateX(26px);
}

    </style></title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    
        <h1 aria-haspopup="dialog"> Bom dia</h1>
        <p>Email: </p>
    
        <form action="/salvar" method="POST">
            <input type="text" name="nome" placeholder="Digite seu nome" required>
            <input type="email" name="email" placeholder="Digite seu email" required>
            <button type="submit">Salvar</button>
        </form>


    <div class="toggle-container">
        <label class="switch">
            <input type="checkbox" id="temaToggle" {% if tema = 'escuro' %}checked{% endif %}>
            <span class="slider"></span>
        </label>
        
    </div>

    <script>
        document.getElementById('temaToggle').addEventListener('change', function() {
            const novoTema = this.checked ? 'escuro' : 'claro';
            document.documentElement.setAttribute('data-tema', novoTema);
            document.getElementById('temaLabel').textContent = novoTema.charAt(0).toUpperCase() + novoTema.slice(1);
            fetch(`/tema/${novoTema}`); 
        });
    </script>
</body>
</html>
